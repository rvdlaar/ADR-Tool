# ADR Tool — OrbStack-compatible Docker Compose
# Self-hosted AI-powered Architecture Decision Record generator with RAG

services:
  adr-tool-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adr-tool-api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - VALID_API_KEYS=${VALID_API_KEYS:-}
      - APP_NAME=ADR Tool API
      - APP_VERSION=1.1.0
      - DEBUG=false
      - RATE_LIMIT_PER_MINUTE=60
      # AI Configuration
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - AI_BASE_URL=${AI_BASE_URL:-}
      # RAG Configuration
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - CHROMA_URL=http://chromadb:8000
    volumes:
      - ./data:/app/data
      - ./uploads:/tmp/adr-uploads
    depends_on:
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  chromadb:
    image: chromadb/chroma:latest
    container_name: adr-tool-chromadb
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  chroma-data:

networks:
  default:
    name: adr-tool-network
